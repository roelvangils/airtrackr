<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirTracker Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="/src/styles/main.scss">
</head>
<body>
    <div id="app">
        <header class="header">
            <div class="header-content">
                <h1><i class="fa-solid fa-location-dot"></i> AirTracker Dashboard</h1>
                <div class="search-container" id="search-container" style="display: none;">
                    <div class="search-field">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                        <input type="text" id="device-search" placeholder="Search AirTags..." autocomplete="off" spellcheck="false">
                        <button class="clear-search" id="clear-search" style="display: none;"><i class="fa-solid fa-xmark"></i></button>
                    </div>
                </div>
                <div class="filter-tabs" id="filter-tabs" style="display: none;">
                    <button class="filter-tab active" data-filter="all">
                        All <span class="filter-count" id="count-all">(0)</span>
                    </button>
                    <button class="filter-tab" data-filter="person">
                        People <span class="filter-count" id="count-people">(0)</span>
                    </button>
                    <button class="filter-tab" data-filter="device">
                        Devices <span class="filter-count" id="count-devices">(0)</span>
                    </button>
                    <button class="filter-tab" data-filter="item">
                        Items <span class="filter-count" id="count-items">(0)</span>
                    </button>
                </div>
            </div>
        </header>

        <main class="main" id="main-content">
            <!-- Content will be dynamically loaded here -->
        </main>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
